<svg width="680" height="490" viewBox="0 0 680 490" xmlns="http://www.w3.org/2000/svg">
<title>OBS chapter hierarchy model</title>
<style>
.th { font: 600 14px Inter, 'Segoe UI', Arial, sans-serif; fill: #3D3D3A; }
.ts { font: 400 12px Inter, 'Segoe UI', Arial, sans-serif; fill: #73726C; }
.zone { fill: none; stroke: #B4B2A9; stroke-width: 1; stroke-dasharray: 6 4; }
.teal { fill: #E6F7F5; stroke: #2AA79B; stroke-width: 1; }
.purple { fill: #F3EFFF; stroke: #8B72E8; stroke-width: 1; }
.gray { fill: #F5F4F0; stroke: #A5A39A; stroke-width: 1; }
</style>
<rect x="0" y="0" width="680" height="490" fill="#FFFFFF"/>
<rect class="teal" x="60" y="22" width="12" height="12" rx="3"/>
<text class="ts" x="80" y="32">geographic</text>
<rect class="purple" x="190" y="22" width="12" height="12" rx="3"/>
<text class="ts" x="210" y="32">thematic</text>
<rect class="gray" x="310" y="22" width="12" height="12" rx="3"/>
<text class="ts" x="330" y="32">shared fields</text>
<rect class="zone" x="40" y="50" width="600" height="274" rx="12"/>
<text class="th" x="56" y="79">chapters collection — split by type</text>
<rect class="teal" x="64" y="92" width="190" height="56" rx="8"/>
<text class="th" x="159" y="115" text-anchor="middle">Country chapters</text>
<text class="ts" x="159" y="134" text-anchor="middle">54 · tier T1–T5 + Growth</text>
<rect class="teal" x="278" y="92" width="150" height="56" rx="8"/>
<text class="th" x="353" y="115" text-anchor="middle">City chapters</text>
<text class="ts" x="353" y="134" text-anchor="middle">4 city branches</text>
<rect class="purple" x="64" y="172" width="215" height="56" rx="8"/>
<text class="th" x="171" y="195" text-anchor="middle">Leadership &amp; community</text>
<text class="ts" x="171" y="214" text-anchor="middle">7 chapters</text>
<rect class="purple" x="303" y="172" width="185" height="56" rx="8"/>
<text class="th" x="395" y="195" text-anchor="middle">Business &amp; capital</text>
<text class="ts" x="395" y="214" text-anchor="middle">3 chapters</text>
<rect class="purple" x="64" y="252" width="225" height="56" rx="8"/>
<text class="th" x="176" y="275" text-anchor="middle">Industry &amp; professional</text>
<text class="ts" x="176" y="294" text-anchor="middle">8 chapters</text>
<rect class="purple" x="313" y="252" width="195" height="56" rx="8"/>
<text class="th" x="410" y="275" text-anchor="middle">Strategic expansion</text>
<text class="ts" x="410" y="294" text-anchor="middle">32 · pillarGroup ×6</text>
<rect class="zone" x="40" y="344" width="600" height="114" rx="12"/>
<text class="th" x="56" y="373">cross-cutting fields on any chapter</text>
<rect class="gray" x="64" y="386" width="180" height="56" rx="8"/>
<text class="th" x="154" y="409" text-anchor="middle">ecosystemTier A–E</text>
<text class="ts" x="154" y="428" text-anchor="middle">ecosystem structure map</text>
<rect class="gray" x="264" y="386" width="160" height="56" rx="8"/>
<text class="th" x="344" y="409" text-anchor="middle">isFlagship</text>
<text class="ts" x="344" y="428" text-anchor="middle">16 pillar chapters</text>
<rect class="gray" x="444" y="386" width="140" height="56" rx="8"/>
<text class="th" x="514" y="409" text-anchor="middle">sortOrder</text>
<text class="ts" x="514" y="428" text-anchor="middle">display order</text>
</svg>
