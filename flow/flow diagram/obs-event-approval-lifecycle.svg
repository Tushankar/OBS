<svg width="680" height="470" viewBox="0 0 680 470" xmlns="http://www.w3.org/2000/svg">
<title>OBS event approval lifecycle</title>
<style>
.th { font: 600 14px Inter, 'Segoe UI', Arial, sans-serif; fill: #3D3D3A; }
.ts { font: 400 12px Inter, 'Segoe UI', Arial, sans-serif; fill: #73726C; }
.arr { stroke: #8A897F; stroke-width: 1.5; fill: none; }
.gray  { fill: #F5F4F0; stroke: #A5A39A; stroke-width: 1; }
.amber { fill: #FCF3E1; stroke: #D9A03F; stroke-width: 1; }
.green { fill: #E8F5E9; stroke: #43A047; stroke-width: 1; }
.red   { fill: #FDECEA; stroke: #D9534F; stroke-width: 1; }
</style>
<rect x="0" y="0" width="680" height="470" fill="#FFFFFF"/>
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8A897F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect class="gray" x="180" y="50" width="200" height="56" rx="8"/>
<text class="th" x="280" y="73" text-anchor="middle">Draft</text>
<text class="ts" x="280" y="92" text-anchor="middle">organizer edits</text>
<line x1="280" y1="106" x2="280" y2="140" class="arr" marker-end="url(#a)"/>
<rect class="amber" x="180" y="146" width="200" height="56" rx="8"/>
<text class="th" x="280" y="169" text-anchor="middle">Pending approval</text>
<text class="ts" x="280" y="188" text-anchor="middle">admin reviews</text>
<line x1="280" y1="202" x2="280" y2="236" class="arr" marker-end="url(#a)"/>
<rect class="green" x="180" y="242" width="200" height="56" rx="8"/>
<text class="th" x="280" y="265" text-anchor="middle">Published</text>
<text class="ts" x="280" y="284" text-anchor="middle">live · bookable</text>
<line x1="280" y1="298" x2="280" y2="332" class="arr" marker-end="url(#a)"/>
<rect class="gray" x="180" y="338" width="200" height="56" rx="8"/>
<text class="th" x="280" y="361" text-anchor="middle">Completed</text>
<text class="ts" x="280" y="380" text-anchor="middle">auto after end date</text>
<rect class="red" x="440" y="146" width="180" height="56" rx="8"/>
<text class="th" x="530" y="169" text-anchor="middle">Rejected</text>
<text class="ts" x="530" y="188" text-anchor="middle">edit &amp; resubmit</text>
<line x1="384" y1="174" x2="434" y2="174" class="arr" marker-end="url(#a)"/>
<path d="M530 146 L530 78 L386 78" class="arr" stroke-dasharray="4 4" marker-end="url(#a)"/>
<rect class="gray" x="60" y="424" width="12" height="12" rx="3"/>
<text class="ts" x="78" y="434">start / end</text>
<rect class="amber" x="170" y="424" width="12" height="12" rx="3"/>
<text class="ts" x="188" y="434">awaiting admin</text>
<rect class="green" x="300" y="424" width="12" height="12" rx="3"/>
<text class="ts" x="318" y="434">live</text>
<rect class="red" x="370" y="424" width="12" height="12" rx="3"/>
<text class="ts" x="388" y="434">changes requested</text>
</svg>
