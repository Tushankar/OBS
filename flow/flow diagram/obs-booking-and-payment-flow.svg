<svg width="680" height="540" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg">
<title>OBS booking and payment flow (MERN)</title>
<style>
.th { font: 600 14px Inter, 'Segoe UI', Arial, sans-serif; fill: #3D3D3A; }
.ts { font: 400 12px Inter, 'Segoe UI', Arial, sans-serif; fill: #73726C; }
.arr { stroke: #8A897F; stroke-width: 1.5; fill: none; }
.purple { fill: #F3EFFF; stroke: #8B72E8; stroke-width: 1; }
.teal { fill: #E6F7F5; stroke: #2AA79B; stroke-width: 1; }
</style>
<rect x="0" y="0" width="680" height="540" fill="#FFFFFF"/>
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8A897F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect class="purple" x="60" y="22" width="12" height="12" rx="3"/>
<text class="ts" x="80" y="32">Attendee journey</text>
<rect class="teal" x="230" y="22" width="12" height="12" rx="3"/>
<text class="ts" x="250" y="32">Platform, automatic</text>
<rect class="purple" x="60" y="60" width="230" height="56" rx="8"/>
<text class="th" x="175" y="83" text-anchor="middle">Discover events</text>
<text class="ts" x="175" y="102" text-anchor="middle">chapter · category · city</text>
<line x1="175" y1="116" x2="175" y2="150" class="arr" marker-end="url(#a)"/>
<rect class="purple" x="60" y="156" width="230" height="56" rx="8"/>
<text class="th" x="175" y="179" text-anchor="middle">Event details</text>
<text class="ts" x="175" y="198" text-anchor="middle">sticky booking card</text>
<line x1="175" y1="212" x2="175" y2="246" class="arr" marker-end="url(#a)"/>
<rect class="purple" x="60" y="252" width="230" height="56" rx="8"/>
<text class="th" x="175" y="275" text-anchor="middle">Register</text>
<text class="ts" x="175" y="294" text-anchor="middle">sign in · select tickets</text>
<line x1="175" y1="308" x2="175" y2="342" class="arr" marker-end="url(#a)"/>
<rect class="purple" x="60" y="348" width="230" height="56" rx="8"/>
<text class="th" x="175" y="371" text-anchor="middle">Pay</text>
<text class="ts" x="175" y="390" text-anchor="middle">Razorpay · Stripe · promo</text>
<line x1="175" y1="404" x2="175" y2="438" class="arr" marker-end="url(#a)"/>
<rect class="purple" x="60" y="444" width="230" height="56" rx="8"/>
<text class="th" x="175" y="467" text-anchor="middle">Receive ticket</text>
<text class="ts" x="175" y="486" text-anchor="middle">QR · PDF · email</text>
<rect class="teal" x="390" y="252" width="230" height="56" rx="8"/>
<text class="th" x="505" y="275" text-anchor="middle">Inventory hold</text>
<text class="ts" x="505" y="294" text-anchor="middle">Mongo txn · 15 min hold</text>
<rect class="teal" x="390" y="348" width="230" height="56" rx="8"/>
<text class="th" x="505" y="371" text-anchor="middle">Webhook verify</text>
<text class="ts" x="505" y="390" text-anchor="middle">single source of truth</text>
<rect class="teal" x="390" y="444" width="230" height="56" rx="8"/>
<text class="th" x="505" y="467" text-anchor="middle">Fulfil order</text>
<text class="ts" x="505" y="486" text-anchor="middle">QR · PDF · invoice · emails</text>
<line x1="294" y1="280" x2="382" y2="280" class="arr" stroke-dasharray="4 4" marker-end="url(#a)"/>
<line x1="294" y1="376" x2="382" y2="376" class="arr" stroke-dasharray="4 4" marker-end="url(#a)"/>
<line x1="386" y1="472" x2="298" y2="472" class="arr" stroke-dasharray="4 4" marker-end="url(#a)"/>
<line x1="505" y1="308" x2="505" y2="342" class="arr" marker-end="url(#a)"/>
<line x1="505" y1="404" x2="505" y2="438" class="arr" marker-end="url(#a)"/>
</svg>
